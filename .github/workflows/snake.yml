name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: FahadRamxan
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Commit snake to repo
        run: |
          mkdir -p assets
          cp dist/github-contribution-grid-snake.svg assets/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-contribution-grid-snake.svg
          git diff --staged --quiet || (git commit -m "Update contribution snake" && git push)
